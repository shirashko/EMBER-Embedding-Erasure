# Reproduce optimal unlearning: Llama / SNMF / Uranium
#
# Usage:
#   python -m ember.run_erasure --config configs/reproduce_optimal_configs/snmf/llama/uranium.yaml \
#       --concepts "Uranium" --train-eval mc \
#       --features-source local

method: snmf
model_name: meta-llama/Llama-3.1-8B-Instruct
rank: 200
seed: 42
topk: 1
run_tests_after_train: true
features_source: local
selection:
  ratio_thresh: 2.0
  coverage_thresh: 0.95
ember_step:
  enabled: false
snmf:
  w_mode: both
  feature_source: all
  in_deltas:
  - 7.0
  out_deltas:
  - 7.0
  dtype: bf16
  layer_ranges_in:
  - - 0
    - 16
  layer_ranges_out:
  - - 11
    - 21
eval:
  alpaca: true
  min_mmlu: 0.7
  max_qa_acc: 0.6
  alpaca_batch_size: 75
  skip_llm_judge: true
relearning:
  enabled: true
  max_paragraphs: 100
  csv_path: data/relearn_paragraphs.json
checkpoint:
  enabled: true
  root: unlearned_checkpoints
