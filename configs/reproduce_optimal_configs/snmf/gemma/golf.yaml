# Reproduce optimal unlearning: Gemma / SNMF / Golf
#
# Usage:
#   python -m ember.run_erasure --config configs/reproduce_optimal_configs/snmf/gemma/golf.yaml \
#       --concepts "Golf" --train-eval mc \
#       --features-source local

method: snmf
model_name: google/gemma-2-2b-it
rank: 100
seed: 42
topk: 1
run_tests_after_train: true
features_source: local
selection:
  ratio_thresh: 2.0
  coverage_thresh: 0.95
ember_step:
  enabled: false
snmf:
  w_mode: both
  feature_source: all
  in_deltas:
  - 10.0
  out_deltas:
  - 10.0
  dtype: bf16
  layer_ranges_in:
  - - 0
    - 12
  layer_ranges_out:
  - - 9
    - 17
eval:
  alpaca: true
  min_mmlu: 0.7
  max_qa_acc: 0.6
  skip_llm_judge: true
relearning:
  enabled: true
  max_paragraphs: 100
  csv_path: data/relearn_paragraphs.json
checkpoint:
  enabled: true
  root: unlearned_checkpoints
