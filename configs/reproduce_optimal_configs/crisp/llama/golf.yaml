# Reproduce optimal unlearning: Llama / CRISP / Golf
#
# Usage:
#   python -m ember.run_erasure --config configs/reproduce_optimal_configs/crisp/llama/golf.yaml \
#       --concepts "Golf" --train-eval mc \
#       --features-source local

method: crisp
model_name: meta-llama/Llama-3.1-8B-Instruct
rank: 200
seed: 42
topk: 1
run_tests_after_train: true
features_source: local
selection:
  ratio_thresh: 2.0
ember_step:
  enabled: false
crisp:
  k_features_grid:
  - 20
  alpha_grid:
  - 50.0
  lr_grid:
  - 0.0001
  batch_size: 16
  num_epochs: 2
  lora_batch_size: 8
  beta: 0.99
  gamma: 0.01
  lora_rank: 4
  sae_cache: llama_sae_cache
  layer_ranges:
  - - 4
    - 28
    - 2
eval:
  alpaca: true
  min_mmlu: 0.7
  max_qa_acc: 0.6
  alpaca_batch_size: 75
  skip_llm_judge: true
relearning:
  enabled: true
  max_paragraphs: 100
  csv_path: data/relearn_paragraphs.json
checkpoint:
  enabled: true
  root: unlearned_checkpoints
