# Reproduce optimal unlearning: Llama / RMU / Golf
#
# Usage:
#   python -m ember.run_erasure --config configs/reproduce_optimal_configs/rmu/llama/golf.yaml \
#       --concepts "Golf" --train-eval mc \
#       --features-source local

method: rmu
model_name: meta-llama/Llama-3.1-8B-Instruct
rank: 200
seed: 42
topk: 1
run_tests_after_train: true
features_source: local
selection:
  ratio_thresh: 2.0
ember_step:
  enabled: false
rmu:
  lr_grid:
  - 0.0001
  alpha_grid:
  - 100.0
  steering_grid:
  - 30.0
  batch_size: 8
  max_num_batches: 150
  min_len: 50
  max_len: 2000
  update_settings:
  - setting_name: S3_lid11_L91011
    layer_id: 11
    layer_ids: 9,10,11
eval:
  alpaca: true
  min_mmlu: 0.7
  max_qa_acc: 0.6
  alpaca_batch_size: 75
  skip_llm_judge: true
relearning:
  enabled: true
  max_paragraphs: 100
  csv_path: data/relearn_paragraphs.json
checkpoint:
  enabled: true
  root: unlearned_checkpoints
