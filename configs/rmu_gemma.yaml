# RMU (Representation Misdirection Unlearning) on Gemma-2-2b-it (no EMBER embedding step).
#
# Each HP cell reloads the model from disk; requires a GPU with >=24 GB VRAM.
#
# Usage:
#   python -m ember.run_erasure --config configs/rmu_gemma.yaml \
#       --train-eval mc --concepts "Harry Potter"

method: rmu
model_name: google/gemma-2-2b-it
rank: 100
seed: 42
topk: 15
run_tests_after_train: true

selection:
  ratio_thresh: 2.0

ember_step:
  enabled: false

rmu:
  lr_grid: null
  alpha_grid: null
  steering_grid: null
  batch_size: 16
  max_num_batches: 150
  min_len: 50
  max_len: 2000

eval:
  alpaca: true
  min_mmlu: 0.7
  max_qa_acc: 0.6

relearning:
  enabled: true
  max_paragraphs: 100
  csv_path: data/relearn_paragraphs.json
