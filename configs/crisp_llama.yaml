# CRISP (SAE + LoRA unlearning) on Llama-3.1-8B-Instruct (no EMBER embedding step).
#
# Usage:
#   python -m ember.run_erasure --config configs/crisp_llama.yaml \
#       --train-eval mc --concepts "Harry Potter"

method: crisp
model_name: meta-llama/Llama-3.1-8B-Instruct
rank: 200
seed: 42
topk: 15
run_tests_after_train: true

selection:
  ratio_thresh: 2.0

ember_step:
  enabled: false

crisp:
  k_features_grid: [5, 10, 20]
  alpha_grid: [5.0, 10.0, 20.0, 50.0]
  lr_grid: [5.0e-5, 1.0e-4, 5.0e-4]
  batch_size: 16
  num_epochs: 2
  lora_batch_size: 8
  beta: 0.99
  gamma: 0.01
  lora_rank: 4
  sae_cache: llama_sae_cache

eval:
  alpaca: true
  min_mmlu: 0.7
  max_qa_acc: 0.6
  alpaca_batch_size: 75

relearning:
  enabled: true
  max_paragraphs: 100
  csv_path: data/relearn_paragraphs.json
